<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laurden</title>
    <style>
        :root {
            --bg: #121213;
            --border: #3a3a3c;
            --correct: #538d4e;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        header {
            width: 100%;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.8rem, 8vw, 2.5rem);
            letter-spacing: 0.3rem;
            font-weight: 300;
            text-transform: uppercase;
        }

        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .btn {
            background-color: var(--correct);
            color: white;
            padding: 18px 50px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
            background-color: #4a7a46;
        }
    </style>
</head>
<body>
    <header>
        <h1>Laurden</h1>
    </header>
    <div class="container">
        <a href="/laurdle/" class="btn">Play Laurdle</a>
    </div>
</body>
</html>
